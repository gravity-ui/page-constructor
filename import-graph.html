<html lang="en">

    <style>
        * {

            padding: 0;

        }
        body {

            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }
        #app {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 320px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #graph {
            flex: 1;
            position: relative;
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #e94560;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 11px;
            color: #8b9dc3;
            margin-top: 4px;
        }
        .search-section {
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: #e94560;
        }
        .filters {
            padding: 15px 20px;
            flex: 1;
            overflow-y: auto;
        }
        .filters h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: #8b9dc3;
            margin-bottom: 12px;
        }
        .category-filter {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .category-filter:hover {
            opacity: 0.8;
        }
        .category-filter.inactive {
            opacity: 0.4;
        }
        .category-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 10px;
        }
        .category-name {
            flex: 1;
            font-size: 13px;
        }
        .category-count {
            font-size: 12px;
            color: #8b9dc3;
        }
        .cycles-section {
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            max-height: 200px;
            overflow-y: auto;
        }
        .cycles-section h3 {
            font-size: 13px;
            color: #e94560;
            margin-bottom: 10px;
        }
        .cycle-item {
            background: #e9456020;
            border: 1px solid #e94560;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 11px;
            font-family: monospace;
            cursor: pointer;
        }
        .cycle-item:hover {
            background: #e9456030;
        }
        .graph-container {
            width: 100%;
            height: 100%;
        }
        .node {
            cursor: pointer;
            transition: filter 0.2s;
        }
        .node:hover {
            filter: brightness(1.2);
        }
        .node.highlighted {
            filter: drop-shadow(0 0 8px #e94560);
        }
        .node.dimmed {
            opacity: 0.2;
        }
        .link {
            fill: none;
            stroke: #4a5568;
            stroke-opacity: 0.4;
            transition: stroke-opacity 0.2s, stroke 0.2s;
        }
        .link.highlighted {
            stroke: #e94560;
            stroke-opacity: 0.8;
            stroke-width: 2px;
        }
        .link.dimmed {
            stroke-opacity: 0.05;
        }
        .node-label {
            font-size: 10px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            opacity: 0.8;
        }
        .tooltip {
            position: fixed;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        .tooltip.visible {
            opacity: 1;
        }
        .tooltip-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 6px;
        }
        .tooltip-path {
            color: #8b9dc3;
            font-family: monospace;
            font-size: 10px;
            margin-bottom: 8px;
        }
        .tooltip-section {
            margin-top: 8px;
        }
        .tooltip-section-title {
            font-size: 10px;
            color: #8b9dc3;
            text-transform: uppercase;
        }
        .tooltip-list {
            margin-top: 4px;
            padding-left: 12px;
        }
        .tooltip-list li {
            font-size: 10px;
            color: #ddd;
            margin: 2px 0;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .control-btn {
            background: #16213e;
            border: 1px solid #0f3460;
            color: #fff;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .control-btn:hover {
            background: #0f3460;
            border-color: #e94560;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 12px;
            font-size: 11px;
        }
        .legend-title {
            color: #8b9dc3;
            margin-bottom: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>

                    ? 'block' : 'none'
            );

            simulation.nodes(filteredNodes);
            simulation.force('link').links(filteredEdges);
            simulation.alpha(1).restart();
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                node.style('opacity', 1);
                return;
            }

            node.style('opacity', d =>
                d.name.toLowerCase().includes(term) ||
                d.path.toLowerCase().includes(term)
                    ? 1 : 0.2
            );
        });

        // Cycles list
        if (cycles.length) {
            const cyclesList = d3.select('#cyclesList');
            cyclesList.selectAll('.cycle-item')
                .data(cycles.slice(0, 10))
                .join('div')
                .attr('class', 'cycle-item')
                .html(d => `
                    <div style="color: #e94560; font-weight: bold; margin-bottom: 4px;">
                        Cycle (${d.length} files)
                    </div>
                    ${d.map(f => `<div>→ ${f.split('/').pop()}</div>`).join('')}
                `)
                .on('click', (e, d) => {
                    // Highlight cycle
                    const cycleIds = new Set(d);
                    node.classed('highlighted', n => cycleIds.has(n.id));
                    link.classed('highlighted', l =>
                        cycleIds.has(l.source.id) && cycleIds.has(l.target.id)
                    );
                });
        }

        // Controls
        document.getElementById('resetBtn').addEventListener('click', () => {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
            selectedNode = null;
            updateHighlight();
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const data = { nodes, edges, cycles, stats };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'import-graph.json';
            a.click();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            const w = document.getElementById('graph').clientWidth;
            const h = document.getElementById('graph').clientHeight;
            svg.attr('viewBox', [0, 0, w, h]);
            simulation.force('center', d3.forceCenter(w / 2, h / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
