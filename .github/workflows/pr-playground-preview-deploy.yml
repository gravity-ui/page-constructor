name: PR Playground Preview Deploy

on:
  workflow_run:
    workflows: ['PR Playground Preview Build']
    types:
      - completed

jobs:
  deploy:
    name: Deploy
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GRAVITY_UI_BOT_GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Extract PR Number
        id: pr
        run: echo "::set-output name=id::$(<pr/pr-id.txt)"
        shell: bash
      - name: Clear destination path
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STORYBOOK_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STORYBOOK_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_EC2_METADATA_DISABLED: true
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run:
          aws s3 rm s3://storybook-static/page-constructor-playground/pulls/${{ steps.pr.outputs.id }}/ \
          --endpoint-url=https://storage.yandexcloud.net \
          --recursive || true
      - name: Upload to S3
        uses: gravity-ui/upload-to-s3-action@v1
        with:
          src-path: static
          dest-path: /page-constructor-playground/pulls/${{ steps.pr.outputs.id }}/
          bucket: storybook-static
          endpoint-url: https://storage.yandexcloud.net
          s3-key-id: ${{ secrets.STORYBOOK_S3_KEY_ID }}
          s3-secret-key: ${{ secrets.STORYBOOK_S3_SECRET_KEY }}
          region: ru-central1
      - name: Create Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GRAVITY_UI_BOT_GITHUB_TOKEN }}
          header: playground-preview
          number: ${{ steps.pr.outputs.id }}
          message: '[Playground Preview](https://preview.gravity-ui.com/page-constructor-playground/${{ steps.pr.outputs.id }}/) is ready.'
